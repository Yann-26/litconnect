# render.yaml
services:
  - type: web
    name: litconnect-admissions
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
    startCommand: gunicorn litconnect.wsgi.application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: litconnect-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com,customdomain.com,localhost
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: litconnect-db
    databaseName: litconnect_db
    user: litconnect_user
    plan: free